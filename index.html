<!DOCTYPE html>
<html lang="en">
<head>

<title>Trash by Andy Mulligan Quiz</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;padding:20px}.container{max-width:900px;margin:auto;background:rgba(0,0,0,.35);padding:25px;border-radius:20px;box-shadow:0 0 25px rgba(0,0,0,.4)}h1{text-align:center;font-size:3rem;margin-bottom:10px}.subtitle{text-align:center;margin-bottom:30px;color:#ffd166}.question{background:rgba(255,255,255,.08);padding:20px;border-radius:15px;margin-bottom:20px}.question h3{margin-top:0;line-height:1.35}button{width:100%;margin-top:10px;padding:14px;border:none;border-radius:12px;cursor:pointer;font-size:1rem;font-weight:bold;transition:.2s}.option{background:#fff;color:#111}.option:hover{transform:scale(1.02);background:#ffd166}.correct{background:#06d6a0!important;color:white!important}.wrong{background:#ef476f!important;color:white!important}#score{text-align:center;font-size:2rem;margin-top:30px;font-weight:bold}#restart{background:#ffd166;color:black}.progress{text-align:center;margin-bottom:20px;font-size:1.2rem}.tag{text-align:center;background:#ef476f;color:white;padding:8px 14px;border-radius:999px;width:max-content;margin:0 auto 20px auto;font-weight:bold}.footer{text-align:center;color:#ddd;font-size:.9rem;margin-top:20px}
</style>
</head>
<body>
<div class="container"><h1>🗑️ TRASH QUIZ 🗑️</h1><div class="tag">Risky. Colourful. Not boring.</div><div class="subtitle">30 Question Challenge on <em>Trash</em> by Andy Mulligan</div><div class="progress" id="progress">Answered: 0 / 30</div><div id="quiz"></div><div id="score"></div><button id="restart" onclick="location.reload()">Restart Quiz</button><div class="footer">Tip: choose carefully — wrong answers reveal the correct one.</div></div>
<script>
const quizData=[{question:'1. Who wrote the novel Trash?',options:['Mark Haddon','Andy Mulligan','John Green','Louis Sachar'],answer:'Andy Mulligan'},{question:'2. What year was Trash first published?',options:['2005','2008','2010','2015'],answer:'2010'},{question:'3. What is the name of the dumpsite where the boys live?',options:['Behala','Manila','Colva','Sampalo'],answer:'Behala'},{question:'4. What type of country is the novel set in?',options:['A wealthy European country','An unnamed developing country','Australia','England'],answer:'An unnamed developing country'},{question:'5. What narrative style is mainly used?',options:['Third person narration','Diary entries','Multiple first-person narrators','Poetry'],answer:'Multiple first-person narrators'},{question:'6. How old is Raphael at the start of the story?',options:['10','12','14','16'],answer:'14'},{question:'7. What is Raphael\'s job?',options:['Mechanic','Street seller','Trash sorter','Police assistant'],answer:'Trash sorter'},{question:'8. Who is Raphael\'s best friend?',options:['Rat','Father Juilliard','Gardo','Olivia'],answer:'Gardo'},{question:'9. What is Rat\'s real name?',options:['Jun-Jun','Jose','Marco','Gabriel'],answer:'Jun-Jun'},{question:'10. Where does Rat live?',options:['In a mansion','Inside a pipe near the dumpsite','At the police station','At the school'],answer:'Inside a pipe near the dumpsite'},{question:'11. Who is Father Juilliard?',options:['A police officer','A corrupt politician','A priest running the Mission School','A journalist'],answer:'A priest running the Mission School'},{question:'12. Who is Olivia?',options:['A doctor','A volunteer helping at the Mission School','A politician','Raphael\'s sister'],answer:'A volunteer helping at the Mission School'},{question:'13. What does Raphael find in the trash?',options:['A gun','A gold necklace','A leather bag','A passport'],answer:'A leather bag'},{question:'14. How much money is inside the bag?',options:['100 pesos','500 pesos','1,100 pesos','10,000 pesos'],answer:'1,100 pesos'},{question:'15. Why do the police come to Behala?',options:['Looking for escaped prisoners','Searching for the missing bag','Closing the dumpsite','Looking for Raphael'],answer:'Searching for the missing bag'},{question:'16. What important item is found in the bag?',options:['A key','A diamond','A phone','A watch'],answer:'A key'},{question:'17. Who originally owned the bag?',options:['Senator Zapanta','Father Juilliard','José Angelico','Gardo'],answer:'José Angelico'},{question:'18. What did José Angelico steal?',options:['Jewellery','Food','Six million dollars','Cars'],answer:'Six million dollars'},{question:'19. Who did José Angelico steal from?',options:['The police','Raphael','Senator Zapanta','Olivia'],answer:'Senator Zapanta'},{question:'20. Who is Senator Zapanta?',options:['A priest','A corrupt politician','A doctor','A fisherman'],answer:'A corrupt politician'},{question:'21. What is the name of Zapanta\'s company?',options:['Feed Us!','Money Corp','City Builders','Power One'],answer:'Feed Us!'},{question:'22. What phrase did José Angelico want on his daughter\'s gravestone?',options:['Never forgotten','Hope lives on','It is accomplished','Forever loved'],answer:'It is accomplished'},{question:'23. How do the boys research clues?',options:['Using newspapers','Using the Mission School computer','Using a library','Using police files'],answer:'Using the Mission School computer'},{question:'24. What happens to Raphael after police suspicion?',options:['He becomes famous','He is arrested and beaten','He leaves the country','He joins the police'],answer:'He is arrested and beaten'},{question:'25. Where was the stolen money hidden?',options:['Inside a fridge','Under a bed','In a safe','In a church'],answer:'Inside a fridge'},{question:'26. Who helps explain how the money was moved?',options:['An old gardener','Olivia','Rat','A teacher'],answer:'An old gardener'},{question:'27. What do the boys do with much of the money?',options:['Buy cars','Burn it','Share it with poor people','Give it to the police'],answer:'Share it with poor people'},{question:'28. What dream of Rat comes true?',options:['Becoming a teacher','Living by the sea as a fisherman','Owning a business','Becoming rich'],answer:'Living by the sea as a fisherman'},{question:'29. What happens to Rat\'s nickname?',options:['He changes it','He stops being called Rat','He keeps it forever','The police give it to him'],answer:'He stops being called Rat'},{question:'30. How do many people view Senator Zapanta by the end?',options:['As a hero','As corrupt','As innocent','As a victim'],answer:'As corrupt'}];
const quiz=document.getElementById('quiz'),scoreDisplay=document.getElementById('score'),progress=document.getElementById('progress');let score=0,answered=0;quizData.forEach(q=>{const div=document.createElement('div');div.className='question';div.innerHTML=`<h3>${q.question}</h3>`;q.options.forEach(option=>{const btn=document.createElement('button');btn.innerText=option;btn.className='option';btn.onclick=()=>{if(div.classList.contains('answered'))return;div.classList.add('answered');answered++;if(option===q.answer){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');[...div.querySelectorAll('button')].forEach(b=>{if(b.innerText===q.answer)b.classList.add('correct')})}progress.innerHTML=`Answered: ${answered} / ${quizData.length}`;if(answered===quizData.length){let m=score>=25?'Elite trash detective!':score>=18?'Strong work — you survived Behala.':score>=10?'Not bad, but reread the clues.':'The dumpsite defeated you — try again.';scoreDisplay.innerHTML=`🎉 Final Score: ${score} / ${quizData.length}<br>${m}`}};div.appendChild(btn)});quiz.appendChild(div)});
</script>
</body>
</html>
